name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # Required for cosign keyless signing

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Build binaries
      run: |
        mkdir -p bin
        # Build Linux binaries
        GOOS=linux GOARCH=amd64 go build -o bin/cde-fuzzer-linux ./cmd/cli/
        GOOS=linux GOARCH=amd64 go build -o bin/cde-fuzzer-server-linux ./cmd/server/
        GOOS=linux GOARCH=amd64 go build -o bin/generate-report-linux ./cmd/generate_report/
        GOOS=linux GOARCH=amd64 go build -o bin/generate-diverse-report-linux ./cmd/generate_diverse_report/
        GOOS=linux GOARCH=amd64 go build -o bin/derive-rules-linux ./cmd/derive_rules/
        GOOS=linux GOARCH=amd64 go build -o bin/generate-synthetic-linux ./cmd/generate_synthetic/

        # Build macOS binaries
        GOOS=darwin GOARCH=amd64 go build -o bin/cde-fuzzer-mac ./cmd/cli/
        GOOS=darwin GOARCH=amd64 go build -o bin/cde-fuzzer-server-mac ./cmd/server/
        GOOS=darwin GOARCH=amd64 go build -o bin/generate-report-mac ./cmd/generate_report/
        GOOS=darwin GOARCH=amd64 go build -o bin/generate-diverse-report-mac ./cmd/generate_diverse_report/
        GOOS=darwin GOARCH=amd64 go build -o bin/derive-rules-mac ./cmd/derive_rules/
        GOOS=darwin GOARCH=amd64 go build -o bin/generate-synthetic-mac ./cmd/generate_synthetic/

        # Build Windows binaries
        GOOS=windows GOARCH=amd64 go build -o bin/cde-fuzzer-windows.exe ./cmd/cli/
        GOOS=windows GOARCH=amd64 go build -o bin/cde-fuzzer-server-windows.exe ./cmd/server/
        GOOS=windows GOARCH=amd64 go build -o bin/generate-report-windows.exe ./cmd/generate_report/
        GOOS=windows GOARCH=amd64 go build -o bin/generate-diverse-report-windows.exe ./cmd/generate_diverse_report/
        GOOS=windows GOARCH=amd64 go build -o bin/derive-rules-windows.exe ./cmd/derive_rules/
        GOOS=windows GOARCH=amd64 go build -o bin/generate-synthetic-windows.exe ./cmd/generate_synthetic/

    - name: Sign all binaries
      run: |
        for binary in bin/*; do
          cosign sign-blob --yes \
            "$binary" \
            --output-signature "${binary}.sig" \
            --output-certificate "${binary}.crt"
        done

    - name: Generate checksums
      run: |
        cd bin
        sha256sum * > checksums-sha256.txt

    - name: Create release and upload assets
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*
        generate_release_notes: true
